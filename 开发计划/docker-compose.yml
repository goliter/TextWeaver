version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - textweaver-network

  backend:
    image: goliter/textweaver-backend:v1.0
    container_name: textweaver-backend
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY}
      AI_API_KEY: ${AI_API_KEY}
      OPENAI_API_BASE: ${OPENAI_API_BASE}
      OPENAI_MODEL: ${OPENAI_MODEL}
      LANGCHAIN_VERBOSE: ${LANGCHAIN_VERBOSE}
      LANGCHAIN_TEMPERATURE: ${LANGCHAIN_TEMPERATURE}
      LANGCHAIN_MAX_TOKENS: ${LANGCHAIN_MAX_TOKENS}
    depends_on:
      - db
    networks:
      - textweaver-network

  frontend:
    image: goliter/textweaver-frontend:v1.0 
    container_name: textweaver-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - textweaver-network

networks:
  textweaver-network:
    driver: bridge

volumes:
  postgres_data: